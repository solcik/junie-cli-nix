name: Check for Updates

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Specific version to update to (optional)'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check for new version
        id: check
        run: |
          CURRENT_VERSION=$(grep 'version = ' package.nix | head -1 | cut -d'"' -f2)
          echo "Current version: $CURRENT_VERSION"

          if [ -n "${{ github.event.inputs.version }}" ]; then
            LATEST_VERSION="${{ github.event.inputs.version }}"
          else
            LATEST_VERSION=$(curl -fsSL https://raw.githubusercontent.com/JetBrains/junie/main/update-info.jsonl \
              | grep '"platform":"linux-amd64"' \
              | tail -1 \
              | grep -o '"version":"[^"]*"' \
              | sed 's/"version":"\([^"]*\)"/\1/')
          fi

          if [ -z "$LATEST_VERSION" ]; then
            echo "Could not fetch latest version"
            exit 0
          fi

          echo "Latest version: $LATEST_VERSION"

          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "new_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
            echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "update_needed=true" >> $GITHUB_OUTPUT
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version
        if: steps.check.outputs.update_needed == 'true'
        run: ./scripts/update.sh --version "${{ steps.check.outputs.new_version }}"

      - name: Create Pull Request
        if: steps.check.outputs.update_needed == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update junie to version ${{ steps.check.outputs.new_version }}"
          title: "chore: update junie to version ${{ steps.check.outputs.new_version }}"
          body: |
            ## Update Junie

            This PR updates Junie from version ${{ steps.check.outputs.current_version }} to ${{ steps.check.outputs.new_version }}.

            ### Changes
            - Updated `version` in `package.nix`
            - Updated binary hashes for all platforms

            ---
            *This PR was automatically generated by the update workflow.*
          branch: update-junie-${{ steps.check.outputs.new_version }}
          delete-branch: true
          labels: |
            dependencies
            automated

      - name: Enable Auto-Merge
        if: steps.check.outputs.update_needed == 'true' && steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash --delete-branch
